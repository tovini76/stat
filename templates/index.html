<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAT-LOTTO 100: 통계학 전문가 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 공이 나타날 때의 부드러운 애니메이션 효과 */
        .ball-appear {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0.5);
        }
        @keyframes popIn {
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4 md:p-6">

    <div class="max-w-4xl w-full bg-slate-800 rounded-3xl shadow-2xl border border-slate-700 overflow-hidden">
        
        <div class="bg-gradient-to-r from-indigo-600 to-blue-700 p-6 md:p-8 text-center">
            <div class="inline-block p-3 bg-white/20 rounded-full mb-4 shadow-lg">
                <i class="fas fa-microchip text-3xl text-blue-100"></i>
            </div>
            <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight">STAT-LOTTO <span class="text-blue-200">ALGORITHM</span></h1>
            <p class="mt-2 text-blue-100 opacity-80 text-xs md:text-sm tracking-widest uppercase">100년 경력 통계학자 기반 데이터 분석 엔진</p>
        </div>

        <div class="p-6 md:p-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 mb-8">
                <div class="bg-slate-700/50 p-4 rounded-xl border border-slate-600 text-center shadow-inner">
                    <p class="text-xs text-slate-400 uppercase mb-1">학습 데이터</p>
                    <p class="text-lg md:text-xl font-bold">1회 ~ 현재</p>
                </div>
                <div class="bg-slate-700/50 p-4 rounded-xl border border-slate-600 text-center shadow-inner">
                    <p class="text-xs text-slate-400 uppercase mb-1">적용 알고리즘</p>
                    <p class="text-lg md:text-xl font-bold text-green-400">Deep Regression</p>
                </div>
                <div class="bg-slate-700/50 p-4 rounded-xl border border-slate-600 text-center shadow-inner">
                    <p class="text-xs text-slate-400 uppercase mb-1">분석 정밀도</p>
                    <p class="text-lg md:text-xl font-bold text-blue-400">99.8% Optimized</p>
                </div>
            </div>

            <div id="result-area" class="flex flex-col gap-4 mb-10 py-10 px-4 bg-slate-900/80 rounded-2xl border-2 border-dashed border-slate-600 min-h-[250px] items-center justify-center">
                <div class="text-center text-slate-500">
                    <i class="fas fa-chart-line text-4xl mb-3 opacity-50"></i>
                    <p class="font-bold">하단의 버튼을 눌러 통계 분석을 시작하세요.</p>
                </div>
            </div>

            <div class="flex flex-col items-center gap-4">
                <button id="generate-btn" class="w-full md:w-72 py-4 bg-indigo-500 hover:bg-indigo-400 transition-all rounded-xl font-bold text-lg shadow-[0_0_15px_rgba(99,102,241,0.5)] active:scale-95 flex items-center justify-center">
                    <i class="fas fa-play mr-2"></i> 통계 기반 번호 생성
                </button>
                <p class="text-slate-500 text-xs text-center leading-relaxed">
                    *본 시스템은 단순 무작위 추출이 아닌 역대 당첨 데이터의 <br class="hidden md:block"> 
                    수리적 회귀 분석을 통해 최적의 확률 구간을 산출합니다.
                </p>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('generate-btn');
        const resultArea = document.getElementById('result-area');

        // 동행복권 실제 공 색상 매칭 로직
        function getBallColor(number) {
            if (number <= 10) return 'bg-yellow-400 text-yellow-900 shadow-yellow-400/30'; // 노란색
            if (number <= 20) return 'bg-blue-500 text-white shadow-blue-500/30'; // 파란색
            if (number <= 30) return 'bg-red-500 text-white shadow-red-500/30'; // 빨간색
            if (number <= 40) return 'bg-gray-500 text-white shadow-gray-500/30'; // 회색
            return 'bg-green-500 text-white shadow-green-500/30'; // 녹색
        }

        btn.addEventListener('click', async () => {
            // 1. 로딩 상태 UI 변경
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>100년 치 데이터 분석 중...';
            btn.classList.add('opacity-70', 'cursor-not-allowed');
            btn.disabled = true;
            
            resultArea.innerHTML = '<div class="text-center text-blue-400 font-bold animate-pulse text-lg"><i class="fas fa-cog fa-spin mr-2"></i>최적의 확률 구간을 탐색 중입니다...</div>';

            try {
                // 2. 파이썬 서버(app.py)의 /generate 주소로 요청을 보냄
                const response = await fetch('/generate');
                const result = await response.json();

                if (result.status === 'success') {
                    resultArea.innerHTML = ''; // 로딩 메시지 지우기
                    resultArea.classList.remove('items-center', 'justify-center'); // 정렬 리셋

                    // 3. 서버에서 받은 5세트의 번호를 화면에 그리기
                    result.data.forEach((numbers, index) => {
                        const rowDiv = document.createElement('div');
                        rowDiv.className = 'flex justify-center items-center gap-1.5 md:gap-3 w-full';
                        
                        // 세트 라벨 (SET 1, SET 2...)
                        const setLabel = document.createElement('span');
                        setLabel.className = 'text-indigo-300 font-bold text-xs md:text-sm w-12 md:w-14 text-right tracking-wider';
                        setLabel.innerText = `SET ${index + 1}`;
                        rowDiv.appendChild(setLabel);

                        // 6개의 공 만들기
                        numbers.forEach((num, ballIndex) => {
                            const ball = document.createElement('div');
                            // 애니메이션 딜레이를 주어 공이 하나씩 순차적으로 나타나게 함
                            ball.className = `w-9 h-9 md:w-12 md:h-12 rounded-full flex items-center justify-center font-bold text-sm md:text-lg shadow-lg ball-appear ${getBallColor(num)}`;
                            ball.style.animationDelay = `${ballIndex * 0.1}s`;
                            ball.innerText = num;
                            rowDiv.appendChild(ball);
                        });

                        resultArea.appendChild(rowDiv);
                    });
                }
            } catch (error) {
                console.error("Error fetching lotto numbers:", error);
                resultArea.innerHTML = '<div class="text-center text-red-400 font-bold"><i class="fas fa-exclamation-triangle mr-2"></i>서버 연결에 실패했습니다. 다시 시도해주세요.</div>';
            } finally {
                // 4. 버튼 상태 원상복구
                btn.innerHTML = '<i class="fas fa-play mr-2"></i> 통계 기반 번호 생성';
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
